syntax = "proto3";

package pliq.ai.v1;

// === Fraud Detection Service ===

service FraudDetectionService {
  rpc AnalyzeImage(AnalyzeImageRequest) returns (FraudReport);
  rpc DetectPriceAnomaly(PriceAnomalyRequest) returns (PriceAnomalyReport);
  rpc DetectDuplicateListing(DuplicateListingRequest) returns (DuplicateReport);
}

message AnalyzeImageRequest {
  bytes image_data = 1;
  string image_format = 2;
  string listing_id = 3;
}

message FraudReport {
  double overall_score = 1;
  double ela_score = 2;
  double fft_score = 3;
  double exif_score = 4;
  string explanation = 5;
  repeated string flags = 6;
}

message PriceAnomalyRequest {
  double listing_price = 1;
  string city = 2;
  int32 bedrooms = 3;
  int32 area_sqm = 4;
  repeated double comparable_prices = 5;
}

message PriceAnomalyReport {
  double score = 1;
  double confidence = 2;
  double z_score = 3;
  double median_price = 4;
  int32 comparable_count = 5;
  string explanation = 6;
}

message DuplicateListingRequest {
  string listing_id = 1;
  string title = 2;
  string description = 3;
  string address = 4;
  double latitude = 5;
  double longitude = 6;
  repeated bytes photos = 7;
}

message DuplicateReport {
  double score = 1;
  double text_similarity = 2;
  double image_similarity = 3;
  double location_proximity = 4;
  repeated string matched_listing_ids = 5;
  string summary = 6;
}

// === Matching Service ===

service MatchingService {
  rpc RankListings(RankListingsRequest) returns (RankListingsResponse);
  rpc RecommendListings(RecommendRequest) returns (RankListingsResponse);
}

message TenantProfile {
  string tenant_id = 1;
  int32 max_commute_minutes = 2;
  int32 noise_tolerance = 3;
  repeated string desired_amenities = 4;
  int32 social_preference = 5;
  double min_budget = 6;
  double max_budget = 7;
  bool has_pets = 8;
  string pet_type = 9;
}

message ListingProfile {
  string listing_id = 1;
  int32 estimated_commute = 2;
  int32 noise_level = 3;
  repeated string amenities = 4;
  int32 social_score = 5;
  double price = 6;
  bool pets_allowed = 7;
  repeated string allowed_pet_types = 8;
}

message RankListingsRequest {
  TenantProfile tenant = 1;
  repeated ListingProfile candidates = 2;
  int32 top_n = 3;
}

message MatchScore {
  string listing_id = 1;
  double overall_score = 2;
  double commute_score = 3;
  double noise_score = 4;
  double amenity_score = 5;
  double social_score = 6;
  double budget_score = 7;
  double pet_score = 8;
  string narrative = 9;
}

message RankListingsResponse {
  repeated MatchScore matches = 1;
}

message RecommendRequest {
  string tenant_id = 1;
  int32 top_n = 2;
}
